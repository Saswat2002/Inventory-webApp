<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      background: white;
      padding: 20px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      color: green;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Inventory Entry</h2>

    <input type="date" id="date">
    <input type="text" id="item" placeholder="Item Name">
    <input type="number" id="opening" placeholder="Opening Stock">
    <input type="number" id="received" placeholder="Received">
    <input type="number" id="issued" placeholder="Issued">

    <button onclick="submitData()">Save</button>

    <div class="msg" id="msg"></div>
  </div>

  <script>
  function submitData() {
    alert("Clicked");  // TEST

    let data = {
      date: document.getElementById("date").value,
      item: document.getElementById("item").value,
      opening: document.getElementById("opening").value,
      received: document.getElementById("received").value,
      issued: document.getElementById("issued").value
    };

    google.script.run
      .withSuccessHandler(function(response) {
        document.getElementById("msg").innerText = response;
      })
      .withFailureHandler(function(err) {
        document.getElementById("msg").innerText = "Error: " + err.message;
      })
      .saveData(data);
  }
</script>
</body>
</html>
