<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      width: 95%;
      background: white;
      padding: 20px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      text-align:center;
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }

    .delete-btn {
      background: red;
      margin-top: 10px;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      color: green;
    }

    table {
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 8px;
    }

    th {
      background: #28a745;
      color: white;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Inventory Entry</h2>

    <input type="date" id="date">
    <input type="text" id="item" placeholder="Item Name">
    <input type="number" id="opening" placeholder="Opening Stock">
    <input type="number" id="received" placeholder="Received">
    <input type="number" id="issued" placeholder="Issued">

    <button onclick="submitData()">Save</button>

    <button onclick="deleteData()" class="delete-btn">
      Delete Item
    </button>

    <div class="msg" id="msg"></div>

    <!-- ✅ INVENTORY TABLE -->
    <h3>Inventory Table</h3>
    <table id="inventoryTable" border="1" width="100%" style="text-align:center;">
      <tr>
        <th>Sl No</th>
        <th>Date</th>
        <th>Item</th>
        <th>Opening</th>
        <th>Received</th>
        <th>Issued</th>
        <th>Closing</th>
      </tr>
    </table>
  </div>

<script>
function submitData() {
  let data = {
    date: document.getElementById("date").value,
    item: document.getElementById("item").value,
    opening: document.getElementById("opening").value,
    received: document.getElementById("received").value,
    issued: document.getElementById("issued").value
  };

  google.script.run
    .withSuccessHandler(function(response) {

      if (response[0] === "UPDATED") {
        document.getElementById("msg").innerText = "✅ Item updated!";
        updateRow(response);
      } 
      else {
        document.getElementById("msg").innerText = "✅ New item added!";
        addRow(response);
      }

    })
    .withFailureHandler(function(err) {
      document.getElementById("msg").innerText =
        "❌ Error: " + err.message;
    })
    .saveData(data);
}

// ➕ ADD NEW ROW
function addRow(rowData) {
  const table = document.getElementById("inventoryTable");

  const newRow = table.insertRow(1);

  for (let i = 1; i < rowData.length; i++) {
    let cell = newRow.insertCell();
    cell.innerText = rowData[i];
  }

  // highlight green
  newRow.style.backgroundColor = "#d4edda";

  setTimeout(() => {
    newRow.style.backgroundColor = "";
  }, 2000);
}

// 🔄 UPDATE EXISTING ROW
function updateRow(rowData) {
  const table = document.getElementById("inventoryTable");
  const rowNumber = rowData[1];

  for (let i = 1; i < table.rows.length; i++) {
    let row = table.rows[i];

    if (row.cells[0].innerText == rowNumber) {

      for (let j = 1; j < rowData.length; j++) {
        row.cells[j - 1].innerText = rowData[j];
      }

      // highlight yellow
      row.style.backgroundColor = "#fff3cd";

      setTimeout(() => {
        row.style.backgroundColor = "";
      }, 2000);

      return;
    }
  }

  // if not found → add
  addRow(rowData);
}

// 🗑 DELETE
function deleteData() {
  let item = document.getElementById("item").value;

  if (!item) {
    document.getElementById("msg").innerText =
      "⚠️ Enter item name to delete";
    return;
  }

  if (!confirm("Are you sure you want to delete this item?")) return;

  google.script.run
    .withSuccessHandler(function(response) {

      if (response[0] === "DELETED") {
        document.getElementById("msg").innerText =
          "🗑 Item deleted successfully!";
      } else {
        document.getElementById("msg").innerText =
          "❌ Item not found!";
      }

    })
    .withFailureHandler(function(err) {
      document.getElementById("msg").innerText =
        "❌ Error: " + err.message;
    })
    .deleteItem(item);
}
</script>

</body>
</html>
